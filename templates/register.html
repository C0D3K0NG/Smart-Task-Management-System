<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your TaskFlow account and start managing tasks smartly." />
  <title>TaskFlow — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/auth.css" />
  <script>
    (function(){
      const t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" title="Toggle dark/light mode" aria-label="Toggle theme">🌙</button>

  <div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="auth-card">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <h1>TaskFlow</h1>
        <p class="brand-sub">Create your account</p>
      </div>

      <div id="error-banner"   class="banner banner-error   hidden"></div>
      <div id="success-banner" class="banner banner-success hidden"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="choose a username" autocomplete="username" maxlength="80" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" maxlength="120" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-field">
          <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" maxlength="128" />
          <button type="button" class="pw-toggle" id="pw-toggle-1" title="Show password" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-strength" id="pw-strength">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-fill"></div></div>
          <span class="pw-strength-label" id="pw-label"></span>
        </div>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="password-field">
          <input id="confirm-password" type="password" placeholder="••••••••" autocomplete="new-password" maxlength="128" />
          <button type="button" class="pw-toggle" id="pw-toggle-2" title="Show password" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button id="register-btn" class="btn-primary">Create Account</button>

      <p class="auth-footer">
        Already have an account? <a href="/login">Sign in →</a>
      </p>
    </div>
  </div>

  <script>
    // ── Theme toggle ────────────────────────────────────────────
    const themeBtn = document.getElementById('theme-toggle');
    function updateThemeIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      themeBtn.textContent = isDark ? '☀️' : '🌙';
    }
    updateThemeIcon();
    themeBtn.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
    });

    // ── Password toggle helpers ─────────────────────────────────
    const eyeOpen = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeClosed = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    function setupToggle(inputId, toggleId) {
      const inp = document.getElementById(inputId);
      const btn = document.getElementById(toggleId);
      btn.addEventListener('click', () => {
        const isPw = inp.type === 'password';
        inp.type = isPw ? 'text' : 'password';
        btn.innerHTML = isPw ? eyeClosed : eyeOpen;
        btn.title = isPw ? 'Hide password' : 'Show password';
      });
    }
    setupToggle('password', 'pw-toggle-1');
    setupToggle('confirm-password', 'pw-toggle-2');

    // ── Password strength meter ─────────────────────────────────
    const pwInput = document.getElementById('password');
    const pwFill  = document.getElementById('pw-fill');
    const pwLabel = document.getElementById('pw-label');

    function checkStrength(pw) {
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
      if (/\d/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    pwInput.addEventListener('input', () => {
      const pw = pwInput.value;
      if (!pw) {
        pwFill.className = 'pw-strength-fill';
        pwLabel.className = 'pw-strength-label';
        pwLabel.textContent = '';
        return;
      }
      const score = checkStrength(pw);
      const levels = ['weak', 'fair', 'good', 'strong'];
      const labels = ['Weak — add uppercase, digits & symbols', 'Fair — keep going', 'Good — almost there', 'Strong ✓'];
      const level = levels[Math.min(score, 3)];
      pwFill.className = `pw-strength-fill ${level}`;
      pwLabel.className = `pw-strength-label ${level}`;
      pwLabel.textContent = labels[Math.min(score, 3)];
    });

    // ── Registration logic ──────────────────────────────────────
    const btn       = document.getElementById('register-btn');
    const errBanner = document.getElementById('error-banner');
    const okBanner  = document.getElementById('success-banner');

    function showErr(msg) {
      errBanner.textContent = msg;
      errBanner.classList.remove('hidden');
      okBanner.classList.add('hidden');
    }

    btn.addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm-password').value;

      if (!username || !email || !password) { showErr('All fields are required.'); return; }
      if (password.length < 8) { showErr('Password must be at least 8 characters.'); return; }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) { showErr('Please enter a valid email address.'); return; }

      if (checkStrength(password) < 2) {
        showErr('Password is too weak. Include uppercase, lowercase, digits, and special characters.');
        return;
      }

      if (password !== confirm) { showErr('Passwords do not match.'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating…';

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();
        if (res.ok) {
          okBanner.textContent = 'Account created! Redirecting to login…';
          okBanner.classList.remove('hidden');
          errBanner.classList.add('hidden');
          setTimeout(() => window.location.href = '/login', 1200);
        } else {
          showErr(data.error || 'Registration failed.');
        }
      } catch {
        showErr('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    // Enter key on all fields
    ['username', 'email', 'password', 'confirm-password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') btn.click();
      });
    });
  </script>
</body>
</html>
