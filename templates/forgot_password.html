<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reset your TaskFlow password. Enter your email to receive a reset link." />
  <title>TaskFlow — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/auth.css" />
  <script>
    (function(){
      const t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" title="Toggle dark/light mode" aria-label="Toggle theme">🌙</button>

  <div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="auth-card">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <h1>TaskFlow</h1>
        <p class="brand-sub">Reset your password</p>
      </div>

      <p class="info-text">
        Enter the email address linked to your account and we'll send you a reset link.
      </p>

      <div id="error-banner"   class="banner banner-error   hidden"></div>
      <div id="success-banner" class="banner banner-success hidden"></div>

      <div class="form-group" id="email-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" maxlength="120" />
      </div>

      <button id="reset-btn" class="btn-primary">Send Reset Link</button>

      <p class="auth-footer">
        Remembered it? <a href="/login">Back to login →</a>
      </p>
    </div>
  </div>

  <script>
    // ── Theme toggle ────────────────────────────────────────────
    const themeBtn = document.getElementById('theme-toggle');
    function updateThemeIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      themeBtn.textContent = isDark ? '☀️' : '🌙';
    }
    updateThemeIcon();
    themeBtn.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
    });

    // ── Reset logic ─────────────────────────────────────────────
    const btn       = document.getElementById('reset-btn');
    const errBanner = document.getElementById('error-banner');
    const okBanner  = document.getElementById('success-banner');

    function showErr(msg) {
      errBanner.textContent = msg;
      errBanner.classList.remove('hidden');
      okBanner.classList.add('hidden');
    }

    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!email) { showErr('Please enter your email address.'); return; }
      if (!emailRegex.test(email)) { showErr('Please enter a valid email address.'); return; }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        // Always show success (don't reveal if email exists or not)
        okBanner.textContent = data.message || 'If an account exists for that email, a reset link has been generated. Check the server console.';
        okBanner.classList.remove('hidden');
        errBanner.classList.add('hidden');
        document.getElementById('email-group').style.display = 'none';
        btn.style.display = 'none';
      } catch {
        showErr('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });

    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>
