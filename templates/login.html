<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to TaskFlow — your smart task management dashboard." />
  <title>TaskFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/auth.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // Apply saved theme immediately to prevent flash
    (function(){
      const t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" title="Toggle dark/light mode" aria-label="Toggle theme"><i data-lucide="moon"></i></button>

  <div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="auth-card">
      <div class="brand">
        <h1>TaskFlow</h1>
        <p class="brand-sub">Smart Task Management</p>
      </div>

      <div id="error-banner" class="banner banner-error hidden"></div>
      <div id="success-banner" class="banner banner-success hidden"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="your username" autocomplete="username" maxlength="80" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-field">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" maxlength="128" />
          <button type="button" class="pw-toggle" id="pw-toggle" title="Show password" aria-label="Toggle password visibility">
            <i data-lucide="eye"></i>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="remember-me" />
          Remember me
        </label>
        <a href="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>

      <button id="login-btn" class="btn-primary">Sign In</button>

      <p class="auth-footer">
        No account? <a href="/register">Create one →</a>
      </p>
    </div>
  </div>

  <script>
    // ── Theme toggle ────────────────────────────────────────────
    const themeBtn = document.getElementById('theme-toggle');
    function updateThemeIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      themeBtn.innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
      if (window.lucide) lucide.createIcons();
    }
    updateThemeIcon();
    themeBtn.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
    });

    // ── Password toggle ─────────────────────────────────────────
    const pwInput = document.getElementById('password');
    const pwToggle = document.getElementById('pw-toggle');
    const eyeOpen = `<i data-lucide="eye"></i>`;
    const eyeClosed = `<i data-lucide="eye-off"></i>`;

    pwToggle.addEventListener('click', () => {
      const isPassword = pwInput.type === 'password';
      pwInput.type = isPassword ? 'text' : 'password';
      pwToggle.innerHTML = isPassword ? eyeClosed : eyeOpen;
      pwToggle.title = isPassword ? 'Hide password' : 'Show password';
      if (window.lucide) lucide.createIcons();
    });

    // ── Login logic ─────────────────────────────────────────────
    const btn = document.getElementById('login-btn');
    const errBanner = document.getElementById('error-banner');
    const okBanner  = document.getElementById('success-banner');

    function showErr(msg) {
      errBanner.textContent = msg;
      errBanner.classList.remove('hidden');
      okBanner.classList.add('hidden');
    }

    btn.addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember-me').checked;
      if (!username || !password) { showErr('Please fill in all fields.'); return; }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, remember }),
        });
        const data = await res.json();
        if (res.ok) {
          okBanner.textContent = `Welcome back, ${data.username}!`;
          okBanner.classList.remove('hidden');
          errBanner.classList.add('hidden');
          setTimeout(() => window.location.href = '/dashboard', 600);
        } else {
          showErr(data.error || 'Login failed.');
        }
      } catch {
        showErr('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Enter key on both fields
    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  </script>
  <script>
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
